spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:event-service/event-service-app/.env[.properties]
  application:
    name: event-service-app

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:event_service_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8081}

eureka:
  client:
    rest-template:
      enabled: true
    restclient:
      enabled: false
    webclient:
      enabled: false
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:your_jwt_secret_key}
  expiration: ${JWT_EXPIRATION:3600000}

# ─── Kafka Producer ───────────────────────────────────────────────────────────

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

kafka:
  topics:
    notification-events: notification-events

# ─── Quartz (DB tabanlı kilit — horizontal scale uyumlu) ─────────────────────
  quartz:
    job-store-type: jdbc           # JdbcJobStore: DB'de distributed lock
    jdbc:
      initialize-schema: always    # QRTZ_* tablolarını otomatik oluşturur
    properties:
      org.quartz.jobStore.isClustered: true
      org.quartz.jobStore.clusterCheckinInterval: 20000
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.scheduler.instanceName: EventServiceScheduler


