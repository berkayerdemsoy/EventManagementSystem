<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hesabınızı Doğrulayın – Aura Events</title>
</head>
<body style="margin:0;padding:0;background-color:#0f0f13;font-family:'Segoe UI',system-ui,Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f13;padding:48px 0;">
  <tr>
    <td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="width:100%;max-width:600px;">

        <!-- Logo / Brand — blur_on icon via inline SVG + "Aura Events" -->
        <tr>
          <td style="padding:0 0 32px;text-align:left;">
            <table cellpadding="0" cellspacing="0">
              <tr>
                <td style="vertical-align:middle;padding-right:8px;">
                  <!--
                    blur_on Material Symbol approximated as inline SVG:
                    filled center circle + concentric opacity rings + 8 radial ticks
                  -->
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="26" height="26" style="display:block;">
                    <circle cx="50" cy="9"  r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="76" cy="18" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="91" cy="44" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="91" cy="70" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="76" cy="82" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="50" cy="91" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="24" cy="82" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="9"  cy="56" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="9"  cy="30" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="24" cy="18" r="5.5" fill="#feaa00" opacity="0.32"/>
                    <circle cx="50" cy="21" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="73" cy="33" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="79" cy="58" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="62" cy="78" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="38" cy="78" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="21" cy="58" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="27" cy="33" r="7"   fill="#feaa00" opacity="0.68"/>
                    <circle cx="50" cy="50" r="28"  fill="#feaa00" opacity="0.18"/>
                    <circle cx="50" cy="50" r="20"  fill="#feaa00"/>
                  </svg>
                </td>
                <td style="vertical-align:middle;">
                  <span style="font-size:18px;font-weight:300;color:#e8e8f0;letter-spacing:0.1em;">Aura Events</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Hero Card -->
        <tr>
          <td style="background-color:#16161e;border-radius:16px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;">

            <!-- Top amber accent line -->
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="height:3px;background:linear-gradient(90deg,#feaa00,#f97316,transparent);"></td>
              </tr>
            </table>

            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="padding:56px 48px 48px;">

                  <!-- Eyebrow label -->
                  <p style="margin:0 0 28px;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#6b6b80;">
                    Hesap Doğrulama
                  </p>

                  <!-- Headline -->
                  <h1 style="margin:0 0 20px;font-size:42px;font-weight:300;line-height:1.1;letter-spacing:-0.03em;color:#e8e8f0;">
                    Hoş geldiniz.
                  </h1>
                  <p style="margin:0 0 48px;font-size:17px;font-weight:300;line-height:1.65;color:#8b8b9e;">
                    Aura Events hesabınızı aktifleştirmek için e-posta adresinizi doğrulamanız gerekiyor.
                    Bu bağlantı <strong style="color:#c8c8d8;font-weight:500;">24 saat</strong> geçerlidir.
                  </p>

                  <!-- CTA Button -->
                  <table cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="background:linear-gradient(135deg,#feaa00,#f97316);border-radius:8px;">
                        <a th:href="${verificationLink}"
                           href="#"
                           style="display:inline-block;padding:16px 40px;color:#0f0f13;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;">
                          Hesabımı Doğrula →
                        </a>
                      </td>
                    </tr>
                  </table>

                  <!-- Fallback link -->
                  <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:40px;">
                    <tr>
                      <td style="border-top:1px solid rgba(255,255,255,0.06);padding-top:28px;">
                        <p style="margin:0 0 8px;font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:#4a4a5c;">
                          Veya bağlantıyı kopyalayın
                        </p>
                        <a th:href="${verificationLink}" th:text="${verificationLink}"
                           style="font-size:12px;color:#5c5c7a;word-break:break-all;text-decoration:none;">link</a>
                      </td>
                    </tr>
                  </table>

                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:28px 0 0;text-align:left;">
            <p style="margin:0;font-size:11px;color:#3d3d4d;line-height:1.6;">
              Bu maili siz talep etmediyseniz güvenle silebilirsiniz.<br/>
              © 2026 Aura Events
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>

</body>
</html>
