services:

  eureka-server:
    build:
      context: ./EurekaServer
      dockerfile: Dockerfile
    image: eurekaserver:latest
    container_name: eurekaserver
    ports:
      - "${SERVER_PORT:-8761}:8761"
    env_file:
      - ./EurekaServer/.env
    environment:
      - SERVER_PORT=${SERVER_PORT:-8761}
      - EUREKA_HOSTNAME=eureka-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped

  user-service-db:
    image: postgres:17-alpine
    container_name: user-service-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - user-service-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: ems-api-gateway
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      EUREKA_URL: http://eureka-server:8761/eureka
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped

  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    image: user-service:latest
    container_name: ems-user-service
    expose:
      - "8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: user-service-db
      DB_PORT: 5432
      DB_NAME: user_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka
      ADMIN_USERNAMES: ${ADMIN_USERNAMES}
      ADMIN_PASSWORDS: ${ADMIN_PASSWORDS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped


volumes:
  user-service-db-data:

networks:
  microservices-network:
    driver: bridge
