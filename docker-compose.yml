services:

  eureka-server:
    build:
      context: ./EurekaServer
      dockerfile: Dockerfile
    image: eurekaserver:latest
    container_name: eurekaserver
    ports:
      - "${SERVER_PORT:-8761}:8761"
    env_file:
      - ./EurekaServer/.env
    environment:
      - SERVER_PORT=${SERVER_PORT:-8761}
      - EUREKA_HOSTNAME=eureka-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped

  user-service-db:
    image: postgres:17-alpine
    container_name: user-service-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - user-service-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: ems-api-gateway
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090
      EUREKA_URL: http://eureka-server:8761/eureka
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped

  user-service:
    build:
      context: ./UserService
      dockerfile: Dockerfile
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    image: user-service:latest
    container_name: ems-user-service
    expose:
      - "8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: user-service-db
      DB_PORT: 5432
      DB_NAME: user_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka
      ADMIN_USERNAMES: ${ADMIN_USERNAMES}
      ADMIN_PASSWORDS: ${ADMIN_PASSWORDS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      KAFKA_BROKERS: kafka:29092
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped

  event-service-db:
    image: postgres:17-alpine
    container_name: event-service-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: event_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - event-service-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-network
    restart: unless-stopped

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    image: event-service:latest
    container_name: ems-event-service
    expose:
      - "8081"
    environment:
      SERVER_PORT: 8081
      DB_HOST: event-service-db
      DB_PORT: 5432
      DB_NAME: event_service_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_URL: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      KAFKA_BROKERS: kafka:29092
    depends_on:
      eureka-server:
        condition: service_healthy
      event-service-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-network
    restart: unless-stopped
  # ─── Kafka (KRaft — Zookeeper'sız) ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - microservices-network
    restart: unless-stopped

  # ─── Kafka UI (DLQ + topic izleme) ──────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped

  # ─── Notification Service ────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
      args:
        GITHUB_ACTOR: ${GITHUB_ACTOR}
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    image: notification-service:latest
    container_name: ems-notification-service
    environment:
      KAFKA_BROKERS: kafka:29092
      RESEND_API_KEY: ${RESEND_API_KEY}
      SERVER_PORT: 8083
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - microservices-network
    restart: unless-stopped


volumes:
  user-service-db-data:
  event-service-db-data:

networks:
  microservices-network:
    driver: bridge
