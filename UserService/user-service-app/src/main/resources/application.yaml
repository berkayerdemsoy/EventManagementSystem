spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:UserService/user-service-app/.env[.properties]
  application:
    name: user-service-app
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_service_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.resend.com
    port: 587
    username: resend
    password: ${RESEND_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 5000

  # ─── Spring gRPC Server ──────────────────────────────────────────────────────
  # HTTP (8080) ile gRPC (9090) farklı portlarda çalışır.
  # Spring gRPC autoconfigure bu ayarı okuyarak Netty tabanlı gRPC sunucusunu başlatır.
  grpc:
    server:
      port: ${GRPC_PORT:9090}

kafka:
  topics:
    notification-events: notification-events

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    rest-template:
      enabled: true
    webclient:
      enabled: false
    restclient:
      enabled: false
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    fetch-registry: true
  instance:
    prefer-ip-address: true
    # gRPC portunu Eureka metadata'sına yayınla.
    # event-service-app'ın lb:// resolver'ı bu değeri okuyarak HTTP portuna (8080)
    # değil gRPC portuna (9090) bağlanır.
    metadata-map:
      grpc.port: ${GRPC_PORT:9090}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

admin:
  usernames: ${ADMIN_USERNAMES:}
  passwords: ${ADMIN_PASSWORDS:}

jwt:
  secret: ${JWT_SECRET:your_jwt_secret_key}
  expiration: ${JWT_EXPIRATION:3600000} # 1 hour in milliseconds

gateway:
  url: ${GATEWAY_URL:http://localhost:8090}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true



