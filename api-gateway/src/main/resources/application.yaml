spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service-app
              uri: lb://user-service-app
              predicates:
                - Path=/users/**

            - id: event-service-events
              uri: lb://event-service-app
              predicates:
                - Path=/events/**

            - id: event-service-categories
              uri: lb://event-service-app
              predicates:
                - Path=/categories/**

            - id: event-service-participants
              uri: lb://event-service-app
              predicates:
                - Path=/participations/**

            # ── Swagger / OpenAPI doc proxy routes ──────────────────────────────
            - id: user-service-api-docs
              uri: lb://user-service-app
              predicates:
                - Path=/v3/api-docs/user-service
              filters:
                - RewritePath=/v3/api-docs/user-service, /v3/api-docs

            - id: event-service-api-docs
              uri: lb://event-service-app
              predicates:
                - Path=/v3/api-docs/event-service
              filters:
                - RewritePath=/v3/api-docs/event-service, /v3/api-docs

          # CORS is handled via CorsConfig.java (CorsFilter bean, HIGHEST_PRECEDENCE)
          # globalcors YAML property is not reliable for spring-cloud-starter-gateway-server-webmvc

server:
  port: ${SERVER_PORT:8090}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

# ── Swagger UI (aggregated) — http://localhost:8090/docs ──────────────────────
springdoc:
  api-docs:
    enabled: true   # Gateway itself has no REST controllers to document
  swagger-ui:
    path: /docs
    enabled: true
    urls:
      - name: "👤 User Service"
        url: /v3/api-docs/user-service
      - name: "📅 Event Service"
        url: /v3/api-docs/event-service
    urls-primary-name: "👤 User Service"
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

