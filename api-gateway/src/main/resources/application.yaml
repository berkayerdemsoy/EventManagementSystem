spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service-app
              uri: lb://user-service-app
              predicates:
                - Path=/users/**

            - id: event-service-events
              uri: lb://event-service-app
              predicates:
                - Path=/events/**

            - id: event-service-categories
              uri: lb://event-service-app
              predicates:
                - Path=/categories/**

#      global-cors:
#        cors-configurations:
#          '[/**]':
#            allowed-origins: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
#            allowed-methods: "*"
#            allowed-headers: "*"
#            allow-credentials: true
#            exposed-headers:
#              - Authorization

server:
  port: ${SERVER_PORT:8090}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
